<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>login page | login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/fontawesome.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

 <div class="container-fluid">
        <!-- navbar here-->

        <ul class="nav justify-content-center bg-dark shadow p-3">
            <a href="index.html">
             <img class ="me-5 image" src="assets/logo.png" alt="image">
             </a>
            <li class="nav-item mt-2">
                <a class="nav-link active text-light" aria-current="page" href="#">Jobs</a>
            </li>
            <li class="nav-item mt-2">
                <a class="nav-link text-light" href="#">Companies</a>
            </li>
            <li class="nav-item mt-2">
                <a class="nav-link text-light" href="#">Services</a>
            </li>
            <li class="nav-item mt-2">
                <a class="nav-link text-light">Success Stories</a>
            </li>
            <li>
                <a href="login.html" class="nav-link ms-5 text-light mt-2 me-2"> Login</a>
            </li>
            <li>
                <a href="register.html"><button class="btn btn-primary mt-2 ms-2">Register</button></a>
            </li>
        </ul>

        <!-- navbar end -->
     <!-- login page -->
       <div class="row justify-content-center align-items-center mt-5">

            <div class="col-md-8 col-lg-5">
                <div class="card shadow-lg border-0 rounded-4 p-4">

                    <div class="text-center mb-4">
                        <i class="fa-solid fa-user-graduate login-icon"></i>
                        <h2 class="mt-3 fw-bold">Login To The System</h2>
                        <p class="text-muted">Placement Tracking System</p>
                    </div>

                    <form action="admin" method="post">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white">
                                    <i class="fa-solid fa-user"></i>
                                </span>
                                <input type="text"
                                       name="username"
                                       class="form-control shadow-none"
                                       placeholder="Enter username"
                                       required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white">
                                    <i class="fa-solid fa-lock"></i>
                                </span>
                                <input type="password"
                                       name="password"
                                       class="form-control shadow-none"
                                       placeholder="Enter password"
                                       autocomplete="off"
                                       required>
                            </div>
                        </div>

                        <input type="hidden" name="user_Type" value="student">

                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">
                            Login
                        </button>

                        <div class="text-center mt-3">
                            <a href="#" class="text-decoration-none">Forgot Password?</a>
                        </div>

                    </form>

                </div>
            </div>
        </div>
   
     <!-- login page end-->

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>


</body>
</html>
