<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<div class="container-fluid">
		<!-- navbar here-->

		<ul class="nav justify-content-center bg-dark shadow p-3">
			<a href="index.html"> <img class="me-5 image"
				src="assets/logo.png" alt="image">
			</a>
			<li class="nav-item mt-2"><a class="nav-link active text-light"
				aria-current="page" href="#">Jobs</a></li>
			<li class="nav-item mt-2"><a class="nav-link text-light"
				href="#">Companies</a></li>
			<li class="nav-item mt-2"><a class="nav-link text-light"
				href="#">Services</a></li>
			<li class="nav-item mt-2"><a class="nav-link text-light">Success
					Stories</a></li>
			<li><a href="login.html"
				class="nav-link ms-5 text-light mt-2 me-2"> Login</a></li>
			<li><a href="register.html"><button
						class="btn btn-primary mt-2 ms-2">Register</button></a></li>
		</ul>

		<!-- navbar end -->
		<!-- login page -->
		<div class="container py-5">
			<div class="row justify-content-center">
				<div class="col-lg-9">

					<div class="card shadow register-card border-0">
						<div class="card-body p-5">

							<div class="text-center mb-4">
								<i class="fa-solid fa-user-graduate title-icon"></i>
								<h2 class="fw-bold mt-3">Student Registration</h2>
								<p class="text-muted">Placement Tracking System</p>
							</div>

							<form action="StudentRegisterServlet" method="post">

								<h5 class="mb-5 fw-bold text-center">Personal Information</h5>

								<div class="row">
									<div class="col-md-6 mb-3">
										<label>First Name *</label> <input type="text" name="fname"
											placeholder="Eg. Elon" class="form-control" required>
									</div>

									<div class="col-md-6 mb-3">
										<label>Last Name *</label> <input type="text" name="lname"
											placeholder="Eg. Musk" class="form-control" required>
									</div>

									<div class="col-md-6 mb-3">
										<label>Email *</label> <input type="email" name="email"
											placeholder="Eg. musk@tesla.com" class="form-control"
											required>
									</div>

									<div class="col-md-6 mb-3">
										<label>Optional Email</label> <input type="email"
											placeholder="Eg. musk@tesla.com" name="optional_email"
											class="form-control">
									</div>

									<div class="col-md-6 mb-3">
										<label>Contact *</label> <input type="text" name="contact"
											placeholder="Eg. 0000000000" class="form-control" required>
									</div>
								</div>

								<h5 class="mb-5 mt-4 fw-bold text-center">Login Details</h5>

								<div class="row">
									<div class="col-md-6 mb-3">
										<label>Username *</label> <input type="text" name="username"
											placeholder="Eg.elon_musk" class="form-control" required>
									</div>

									<div class="col-md-6 mb-3">
										<label>Password *</label> <input type="password"
											placeholder="Eg. elon@142" autocomplete="off" name="password"
											class="form-control" required>
									</div>
								</div>

								<h5 class="mb-5 mt-4 fw-bold text-center">Education Details</h5>

								<div class="row">
									<div class="col-md-4 mb-3">
										<label>SSC % *</label> <input type="number"
											placeholder="Eg. 35" step="0.01" name="ssc"
											class="form-control" required>
									</div>

									<div class="col-md-4 mb-3">
										<label>HSC %</label> <input type="number" placeholder="Eg. 35"
											step="0.01" name="hsc" class="form-control">
									</div>

									<div class="col-md-4 mb-3">
										<label>Diploma %</label> <input type="number"
											placeholder="Eg. 35" step="0.01" name="diploma"
											class="form-control">
									</div>

									<div class="col-md-6 mb-3">
										<label>Diploma Branch</label> <input type="text"
											name="diploma_branch" placeholder="Eg. Computer"
											class="form-control">
									</div>

									<div class="col-md-6 mb-3">
										<label>Graduation %</label> <input type="number" step="0.01"
											placeholder="Eg. 60" name="graduation" class="form-control">
									</div>

									<div class="col-md-6 mb-3">
										<label>Graduation Branch</label> <input type="text"
											name="graduation_branch"
											placeholder="Eg. Computer Engineering" class="form-control">
									</div>

									<div class="col-md-6 mb-3">
										<label>Graduation Year</label> <input type="number"
											name="graduation_year" placeholder="Eg. 2030"
											class="form-control">
									</div>

									<div class="col-md-6 mb-3">
										<label>Post Graduation Branch</label> <input type="text"
											name="pgraduation_branch" placeholder="Eg. Computer"
											class="form-control">
									</div>

									<div class="col-md-6 mb-3">
										<label>Post Graduation %</label> <input type="number"
											step="0.01" placeholder="Eg. 65" name="post_graduation"
											class="form-control">
									</div>
								</div>

								<div class="text-center mt-4">
									<button class="btn btn-primary px-5 rounded-pill">
										Register</button>
								</div>

							</form>

						</div>
					</div>

				</div>
			</div>
		</div>
	</div>
</body>
</html>
